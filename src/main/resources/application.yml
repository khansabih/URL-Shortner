spring:
  application:
    name: url-shortner

  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortner
    username: user
    password: user
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true # DEV only, turn off in PROD.

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  base-url: http://localhost:8080
  short-code:
    id-offset: 1000000