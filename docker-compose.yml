services:
  postgres:
    image: postgres:16-alpine
    container_name: urlshortner-postgres
    environment:
      POSTGRES_DB: urlshortner
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: urlshortner-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
